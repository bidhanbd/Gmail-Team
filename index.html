<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gmail Team Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#050816;
  color:#fff;
  overflow:hidden;
}

#codeCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
  opacity:.2;
}

.container{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:20px;
}

.card{
  width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.title{
  font-size:40px;
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(90deg,#fff,#8acbff,#c7a7ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  color:#aaa;
}

.input{
  width:100%;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
  border:none;
  background:#0d132b;
  color:#fff;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3d5afe,#8a5cff);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.stat{
  font-size:30px;
}
</style>
</head>

<body>

<canvas id="codeCanvas"></canvas>

<div id="login" class="container">
  <div class="card">
    <div class="title">Gmail Team Pro</div>
    <div class="sub">Team member হলে নিজের নামটাই password.</div>
  </div>

  <div class="card">
    <div style="font-size:22px;font-weight:700;">Enter Password</div>
    <input id="pass" class="input" type="password" placeholder="Enter password">
    <button class="btn" onclick="login()">Login</button>
    <div style="margin-top:10px;color:#888;font-size:13px;">
      admin@555 | super@2024
    </div>
  </div>
</div>

<div id="dash" class="dashboard">
  <h2 id="role"></h2>
  <div class="stat">Total: <span id="total"></span></div>
  <div class="stat">Good: <span id="good"></span></div>
  <div class="stat">Problem: <span id="problem"></span></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwdmSLfhzhD1KL3zNRFn7EJ8zdQNNy_dgTSx89XZkkjTWl8mbTtzcRfdgQdG2eze8E/exec?action=dashboard";

let members=[];

async function load(){
  let res=await fetch(API);
  let data=await res.json();
  members=data.memberNames||[];
  window.data=data;
}
load();

function login(){
  let p=document.getElementById("pass").value.trim();

  if(p==="admin@555"){
    show("Admin");
    return;
  }

  if(p==="super@2024"){
    show("Super Admin");
    return;
  }

  let m=members.find(x=>x.toLowerCase()===p.toLowerCase());
  if(m){
    show("Team Member: "+m);
    return;
  }

  alert("Wrong password");
}

function show(role){
  document.getElementById("login").style.display="none";
  document.getElementById("dash").style.display="block";

  document.getElementById("role").innerText=role;
  document.getElementById("total").innerText=data.totalMails;
  document.getElementById("good").innerText=data.goodMails;
  document.getElementById("problem").innerText=data.problemMails;
}

/* background animation */
const canvas=document.getElementById("codeCanvas");
const ctx=canvas.getContext("2d");
let w,h;

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
resize();

let letters="01{}[]<>function";
let drops=Array(200).fill(1);

function draw(){
  ctx.fillStyle="rgba(5,8,22,0.1)";
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle="#3d5afe";
  ctx.font="14px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*10,drops[i]*10);

    if(drops[i]*10>h && Math.random()>0.95) drops[i]=0;
    drops[i]++;
  }

  requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize",resize);
</script>

</body>
</html>
